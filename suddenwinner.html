<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 신의 경지 달성! 👑</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(145deg, #0f0c20, #150721, #24042a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Malgun Gothic', sans-serif;
            color: #fff;
            overflow: hidden;
        }
        .container {
            background: rgba(255, 255, 255, 0.03);
            padding: 50px 80px;
            border-radius: 24px;
            border: 3px solid #f59e0b;
            box-shadow: 0 0 40px rgba(245, 158, 11, 0.4), inset 0 0 20px rgba(245, 158, 11, 0.1);
            text-align: center;
            max-width: 90%;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
            animation: scaleUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        h1 {
            font-size: 3.5rem;
            margin: 0 0 10px 0;
            color: #f59e0b;
            text-shadow: 0 0 20px rgba(245, 158, 11, 0.6);
            letter-spacing: 2px;
            animation: bounce 1s infinite alternate;
        }
        .subtitle {
            font-size: 1.6rem;
            font-weight: bold;
            color: #e2e8f0;
            margin-bottom: 30px;
        }
        .score-box {
            font-size: 5rem;
            font-weight: 900;
            color: #10b981;
            margin: 30px 0;
            text-shadow: 0 0 25px rgba(16, 185, 129, 0.7);
            background: rgba(16, 185, 129, 0.1);
            padding: 15px 40px;
            border-radius: 50px;
            display: inline-block;
        }
        .desc {
            font-size: 1.15rem;
            color: #94a3b8;
            max-width: 500px;
            margin: 0 auto 40px auto;
            line-height: 1.8;
        }
        .btn {
            background: linear-gradient(to right, #f59e0b, #d97706);
            color: #fff;
            border: none;
            padding: 15px 45px;
            font-size: 1.25rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(217, 119, 6, 0.4);
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s ease;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(217, 119, 6, 0.6);
        }
        @keyframes scaleUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="main-title">👑 GOD'S HAND 👑</h1>
        <div class="subtitle" id="sub-title">인간 컴퍼스의 완벽한 부활!</div>
        
        <div class="score-box" id="display-score">0</div>
        
        <div class="desc" id="main-desc">
            기하학의 신조차 감탄할 만한 대칭성과 정밀함입니다.<br>
            당신이 마우스(터치)로 도달한 이 경이로운 궤적은<br>
            원 그리기 명예의 전당 최상위권에 영원히 박제됩니다!
        </div>
        
        <a href="index.html" class="btn" id="retry-btn">다시 도전하기</a>
    </div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const urlScore = urlParams.get('score');
    const game = urlParams.get('game'); // 'rps', 'abc' 또는 없으면 원 그리기

    // ============================
    // 블록쌓기 연승 달성 케이스
    // ============================
    if (game === 'block') {
        const celebrationToken = sessionStorage.getItem('block_celebration_verified');
        const verifiedScore = sessionStorage.getItem('block_celebration_score');

        if (celebrationToken !== 'true' || !verifiedScore || urlScore !== verifiedScore) {
            alert("🚫 잘못된 접근입니다. 정상적인 경로로 이용해 주세요!");
            window.location.href = 'index.html';
        } else {
            document.getElementById('main-title').innerText = '👑 SKY ARCHITECT 👑';
            document.getElementById('sub-title').innerText = '블록쌓기 명예의 전당 달성!';
            document.getElementById('display-score').innerText = verifiedScore + '층';
            document.getElementById('main-desc').innerHTML =
                `중력을 거스르며 쌓아올린 ${verifiedScore}층의 탑.<br>` +
                `흔들리지 않는 균형 감각과 찰나의 타이밍으로<br>` +
                `블록쌓기 명예의 전당에 이름을 새겼습니다!`;
            document.getElementById('retry-btn').innerText = '다시 도전하기';

            // 티켓 즉시 폐기
            sessionStorage.removeItem('block_celebration_verified');
            sessionStorage.removeItem('block_celebration_score');
        }

    // ============================
    // 가위바위보 1등 달성 케이스
    // ============================
    } else if (game === 'rps') {
        const celebrationToken = sessionStorage.getItem('rps_celebration_verified');
        const verifiedScore = sessionStorage.getItem('rps_celebration_score');

        if (celebrationToken !== 'true' || !verifiedScore || urlScore !== verifiedScore) {
            alert("🚫 잘못된 접근입니다. 정상적인 경로로 이용해 주세요!");
            window.location.href = 'index.html';
        } else {
            document.getElementById('main-title').innerText = '👑 NO.1 CHAMPION 👑';
            document.getElementById('sub-title').innerText = '가위바위보 명예의 전당 1위 등극!';
            document.getElementById('display-score').innerText = verifiedScore + '연승';
            document.getElementById('main-desc').innerHTML =
                `단 한 번도 무너지지 않은 ${verifiedScore}연승의 신화.<br>` +
                `철벽 같은 판단력과 흔들리지 않는 멘탈로<br>` +
                `가위바위보 명예의 전당 정상을 차지했습니다!`;
            document.getElementById('retry-btn').innerText = '다시 도전하기';

            // 티켓 즉시 폐기
            sessionStorage.removeItem('rps_celebration_verified');
            sessionStorage.removeItem('rps_celebration_score');
        }

    // ============================
    // 앞뒤 맞추기 연승 달성 케이스
    // ============================
    } else if (game === 'abc') {
        const celebrationToken = sessionStorage.getItem('abc_celebration_verified');
        const verifiedScore = sessionStorage.getItem('abc_celebration_score');

        if (celebrationToken !== 'true' || !verifiedScore || urlScore !== verifiedScore) {
            alert("🚫 잘못된 접근입니다. 정상적인 경로로 이용해 주세요!");
            window.location.href = 'index.html';
        } else {
            document.getElementById('main-title').innerText = '👑 PERFECT STREAK 👑';
            document.getElementById('sub-title').innerText = '앞뒤 맞추기 명예의 전당 달성!';
            document.getElementById('display-score').innerText = verifiedScore + '연승';
            document.getElementById('main-desc').innerHTML =
                `단 한 글자도 놓치지 않은 ${verifiedScore}연승의 기록.<br>` +
                `번개 같은 반응 속도와 완벽한 순서 감각으로<br>` +
                `앞뒤 맞추기 명예의 전당에 이름을 올렸습니다!`;
            document.getElementById('retry-btn').innerText = '다시 도전하기';

            // 티켓 즉시 폐기
            sessionStorage.removeItem('abc_celebration_verified');
            sessionStorage.removeItem('abc_celebration_score');
        }

    // ============================
    // 원 그리기 95점 이상 케이스
    // ============================
    } else {
        const celebrationToken = sessionStorage.getItem('circle_celebration_verified');
        const verifiedScore = sessionStorage.getItem('circle_celebration_score');

        if (celebrationToken !== 'true' || !verifiedScore || urlScore !== verifiedScore) {
            alert("🚫 잘못된 접근입니다. 정상적인 경로로 이용해 주세요!");
            window.location.href = 'index.html';
        } else {
            document.getElementById('display-score').innerText = verifiedScore + '%';

            // 티켓 즉시 폐기
            sessionStorage.removeItem('circle_celebration_verified');
            sessionStorage.removeItem('circle_celebration_score');
        }
    }
</script>
</body>
</html>
