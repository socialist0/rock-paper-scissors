<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 신의 손 달성 축하합니다! 👑</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(145deg, #0f0c20, #150721, #24042a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Malgun Gothic', sans-serif;
            color: #fff;
            overflow: hidden;
        }
        .container {
            background: rgba(255, 255, 255, 0.03);
            padding: 50px 80px;
            border-radius: 24px;
            border: 3px solid #f59e0b;
            box-shadow: 0 0 40px rgba(245, 158, 11, 0.4), inset 0 0 20px rgba(245, 158, 11, 0.1);
            text-align: center;
            max-width: 90%;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
            animation: scaleUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        h1 {
            font-size: 3.5rem;
            margin: 0 0 10px 0;
            color: #f59e0b;
            text-shadow: 0 0 20px rgba(245, 158, 11, 0.6);
            letter-spacing: 2px;
            animation: bounce 1s infinite alternate;
        }
        .subtitle {
            font-size: 1.6rem;
            font-weight: bold;
            color: #e2e8f0;
            margin-bottom: 30px;
        }
        .score-box {
            font-size: 5rem;
            font-weight: 900;
            color: #10b981;
            margin: 30px 0;
            text-shadow: 0 0 25px rgba(16, 185, 129, 0.7);
            background: rgba(16, 185, 129, 0.1);
            padding: 15px 40px;
            border-radius: 50px;
            display: inline-block;
        }
        .desc {
            font-size: 1.15rem;
            color: #94a3b8;
            max-width: 500px;
            margin: 0 auto 40px auto;
            line-height: 1.8;
        }
        .btn {
            background: linear-gradient(to right, #f59e0b, #d97706);
            color: #fff;
            border: none;
            padding: 15px 45px;
            font-size: 1.25rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(217, 119, 6, 0.4);
            text-decoration: none;
            display: inline-block;
            transition: all 0.2s ease;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(217, 119, 6, 0.6);
        }
        @keyframes scaleUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>👑 GOD'S HAND 👑</h1>
        <div class="subtitle">인간 컴퍼스의 완벽한 부활!</div>
        
        <div class="score-box" id="display-score">0%</div>
        
        <div class="desc">
            기하학의 신조차 감탄할 만한 대칭성과 정밀함입니다.<br>
            당신이 마우스(터치)로 도달한 이 경이로운 궤적은<br>
            원 그리기 명예의 전당 최상위권에 영원히 박제됩니다!
        </div>
        
        <a href="index.html" class="btn">다시 그리기 도전</a>
    </div>

<script>
        // 1. 세션 스토리지에서 인증 티켓과 정상 점수를 읽어옵니다.
        const celebrationToken = sessionStorage.getItem('circle_celebration_verified');
        const verifiedScore = sessionStorage.getItem('circle_celebration_score');
        
        // 2. URL 파라미터에서 점수를 읽어옵니다.
        const urlParams = new URLSearchParams(window.location.search);
        const urlScore = urlParams.get('score');

        // 3. 보안 검증: 티켓이 없거나, URL 점수가 가짜이거나 조작된 경우 즉시 차단!
        if (celebrationToken !== 'true' || !verifiedScore || urlScore !== verifiedScore) {
            alert("🚫 잘못된 접근입니다. 정상적인 경로로 이용해 주세요!");
            window.location.href = 'index.html';
        } else {
            // 정상적인 접근일 때만 화면에 점수를 표시합니다.
            document.getElementById('display-score').innerText = verifiedScore + '%';
            
            // [보안 강화] 한 번 축하 페이지를 본 후에는 새로고침이나 주소 공유로 재접속하지 못하도록 티켓을 즉시 폐기합니다.
            sessionStorage.removeItem('circle_celebration_verified');
            sessionStorage.removeItem('circle_celebration_score');
        }
    </script>
</body>
</html>
