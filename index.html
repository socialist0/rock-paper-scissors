<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>가위바위보 게임</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>✌️ 가위바위보 게임 ✊</h1>
    
    <div id="user-setup">
        <input type="text" id="username-input" placeholder="닉네임을 입력하세요">
        <button onclick="saveUsername()">시작하기</button>
    </div>

    <div id="game-area" style="display: none;">
        <p><strong id="display-username"></strong>님, 환영합니다!</p>
        
        <div class="score-board">
            <p><span id="player-name-display">나</span>의 현재 연승: <span id="user-score">0</span></p>
        </div>

        <div class="choices">
            <button onclick="playGame('rock')">주먹</button>
            <button onclick="playGame('paper')">보</button>
            <button onclick="playGame('scissors')">가위</button>
        </div>

        <div id="result">
            <h2 id="result-text">버튼을 눌러 게임을 시작하세요!</h2>
        </div>

        <hr> 
        <div class="ranking-board">
            <h3>🌍 전 세계 Top 10 연승 기록</h3>
            <ul id="rankingList" style="list-style: none; padding: 0;">
                <li>데이터를 불러오는 중...</li>
            </ul>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
