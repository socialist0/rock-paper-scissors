<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멀티 미니게임 천국</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>🎮 미니게임 천국 🕹️</h1>
    
    <div id="user-setup">
        <input type="text" id="username-input" placeholder="닉네임을 입력하세요">
        <button onclick="saveUsername()">시작하기</button>
    </div>

    <div id="game-area" style="display: none;">
        <p><strong id="display-username"></strong>님, 반갑습니다! 원하시는 게임을 선택하세요.</p>
        
        <div class="tab-menu">
            <button id="tab-rps" class="tab-btn active" onclick="switchGame('rps')">✌️ 가위바위보</button>
            <button id="tab-circle" class="tab-btn" onclick="switchGame('circle')">⭕ 원 그리기</button>
        </div>

        <div id="content-rps" class="game-content">
            <div class="score-board">
                <p>나의 현재 연승: <span id="user-score">0</span></p>
            </div>

            <div class="choices">
                <button onclick="playGame('rock')">주먹</button>
                <button onclick="playGame('paper')">보</button>
                <button onclick="playGame('scissors')">가위</button>
            </div>

            <div id="result">
                <h2 id="result-text">버튼을 눌러 게임을 시작하세요!</h2>
            </div>

            <hr> 
            <div class="ranking-board">
                <h3>🌍 가위바위보 전 세계 Top 10 연승 기록</h3>
                <ul id="rankingList" class="ranking-list">
                    <li>데이터를 불러오는 중...</li>
                </ul>
            </div>
        </div>

        <div id="content-circle" class="game-content" style="display: none;">
            <div id="ui-container">
                <h2 style="font-size: 1.3rem; margin-bottom: 5px;">가장 완벽한 원을 그려보세요!</h2>
                <div id="score-display">0%</div>
                <div id="message">화면에 마우스나 손가락으로 원을 그리세요.</div>
            </div>

            <canvas id="drawCanvas"></canvas>

            <hr>
            <div class="ranking-board">
                <h3>🌍 원 그리기 전 세계 Top 10 명예의 전당</h3>
                <ul id="circleRankingList" class="ranking-list">
                    <li>데이터를 불러오는 중...</li>
                </ul>
            </div>
        </div>

    </div>

<script src="security.js"></script>
<script src="script.js"></script>
</body>
</html>
